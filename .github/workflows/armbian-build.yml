name: RK3128-Armbian-Printer-Server

于:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 核心修复：初始化 QEMU 模拟器，解决 binfmts 报错
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      # 2. 安装必要的构建依赖
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-user-static \
            binfmt-support \
            git \
            wget \
            curl \
            bc \
            python3 \
            swig \
            libpython3-dev \
            libncurses-dev \
            libssl-dev \
            build-essential \
            device-tree-compiler \
            flex \
            bison

      # 3. 运行构建脚本
      - name: Build Armbian
        run: |
          # 确保脚本有执行权限
          chmod +x build.sh
          # 运行构建并捕获错误日志
          sudo ./build.sh || { echo "Build failed, checking logs..."; exit 1; }

      # 4. 查找生成的镜像文件
      - name: Prepare Artifacts
        run: |
          mkdir -p output_zip
          # 根据你的项目路径，将生成的 .img 或 .7z 移动到 output_zip 文件夹
          # 假设输出在 output/images 目录下，请根据实际情况微调
          find output/images/ -name "*.img*" -exec cp {} output_zip/ \;
          find output/images/ -name "*.7z*" -exec cp {} output_zip/ \;

      # 5. 上传产物（使用 v4 版本更稳定）
      - name: Upload Artifact
        uses: actions/actions-tool@v4
        with:
          name: RK3128-Armbian-32bit-Printer-Server-Final
          path: output_zip/*
          retention-days: 7
