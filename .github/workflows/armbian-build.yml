name: RK3128-Armbian-Printer-Server

于:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 核心修复：正确注册 QEMU 环境 (解决 binfmts 报错的关键)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      # 2. 安装构建必须的系统依赖包
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-user-static \
            binfmt-support \
            git \
            wget \
            curl \
            bc \
            python3 \
            swig \
            libpython3-dev \
            libncurses-dev \
            libssl-dev \
            build-essential \
            device-tree-compiler \
            flex \
            bison \
            pkg-config \
            zip

      # 3. 赋予权限并执行构建
      - name: Build Armbian
        run: |
          chmod +x build.sh
          sudo ./build.sh

      # 4. 整理产物路径 (确保上传的是最终镜像而非临时缓存)
      - name: Prepare Artifacts
        run: |
          mkdir -p ./output_zip
          # 自动寻找常见的镜像后缀并移动到统一目录
          find . -name "*.img*" -exec cp {} ./output_zip/ \; || true
          find . -name "*.7z*" -exec cp {} ./output_zip/ \; || true
          find . -name "*.tar.gz" -exec cp {} ./output_zip/ \; || true

      # 5. 上传产物 (升级到 v4 以获得更稳定的下载链接)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RK3128-Armbian-32bit-Printer-Server-Final
          path: ./output_zip/
          if-no-files-found: error
          retention-days: 7
